<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>仙途 · 文字修仙</title>
<style>
/* ============================================================
   水墨风修仙游戏 — 前端样式
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

:root {
  --bg: #1a1410;
  --panel: #2a2218;
  --panel-2: #211b15;
  --gold: #c9a96e;
  --gold-light: #e0c88a;
  --text: #d4c5a9;
  --text-dim: #8a7b65;
  --accent: #a0522d;
  --jade: #6b8e6b;
  --ink-blue: #49627a;
  --danger: #8b3a3a;
  --border: #3a3020;
  --page-padding: 20px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { min-height: 100%; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

body {
  font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  touch-action: manipulation;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(107,142,107,0.05) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(73,98,122,0.05) 0%, transparent 42%);
}

/* 粒子背景 */
#particles {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.particle {
  position: absolute;
  color: rgba(201,169,110,0.3);
  font-size: 20px;
  animation: float-up linear infinite;
  user-select: none;
}
@keyframes float-up {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* 主容器 */
#app {
  position: relative; z-index: 1;
  width: min(100%, 840px); margin: 0 auto;
  padding: calc(28px + var(--safe-top)) calc(var(--page-padding) + var(--safe-right)) calc(72px + var(--safe-bottom)) calc(var(--page-padding) + var(--safe-left));
  min-height: 100vh;
  min-height: 100dvh;
  display: flex; flex-direction: column;
}

/* 标题栏 */
#header {
  text-align: center; padding: 24px 0 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
#header h1 {
  font-size: 2.2rem; color: var(--gold);
  letter-spacing: 0.3em; font-weight: 700;
  text-shadow: 0 2px 10px rgba(201,169,110,0.3);
}
#header .subtitle {
  font-size: 0.9em; color: var(--text-dim);
  margin-top: 8px; letter-spacing: 0.2em;
}

/* 内容区 — 卷轴风格 */
#content {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 32px 28px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
  position: relative;
  min-height: 400px;
  overflow-wrap: anywhere;
}
#content::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
#content::after {
  content: ''; position: absolute; bottom: 0; left: 20px; right: 20px;
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}

/* 章节标题 */
.chapter-title {
  font-size: 1.3rem; color: var(--gold);
  text-align: center; margin-bottom: 25px;
  letter-spacing: 0.15em;
  line-height: 1.55;
}
.chapter-title::before { content: '—— '; color: var(--text-dim); }
.chapter-title::after { content: ' ——'; color: var(--text-dim); }

/* 正文 */
.story-text {
  font-size: 1.05rem; line-height: 2.05;
  white-space: pre-line; color: var(--text);
  margin-bottom: 30px; text-indent: 2em;
  overflow-wrap: anywhere;
}

/* 选项按钮 */
.choices {
  display: flex; flex-direction: column; gap: 12px;
}
.choice-btn {
  display: flex; width: 100%; padding: 14px 18px;
  min-height: 48px; align-items: center; gap: 12px;
  font-family: inherit; font-size: 1rem; line-height: 1.55;
  color: var(--text); background: rgba(0,0,0,0.3);
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; text-align: left; transition: all 0.3s;
  position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.choice-btn::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 0; background: linear-gradient(90deg, rgba(201,169,110,0.15), transparent);
  transition: width 0.4s;
}
.choice-btn:hover {
  border-color: var(--gold); color: var(--gold-light);
  box-shadow: 0 0 20px rgba(201,169,110,0.1);
}
.choice-btn:active { transform: translateY(1px); border-color: var(--gold); }
.choice-btn:focus-visible,
.action-btn:focus-visible,
.trait-option:focus-visible,
.modal .close-btn:focus-visible,
.attr-stepper:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}
.choice-btn:hover::before { width: 100%; }
.choice-btn .idx {
  display: inline-block; width: 28px; height: 28px; line-height: 28px;
  flex: 0 0 28px;
  text-align: center; border: 1px solid var(--border); border-radius: 50%;
  font-size: 0.85rem; color: var(--gold);
  transition: all 0.3s;
}
.choice-btn:hover .idx {
  background: var(--gold); color: var(--bg); border-color: var(--gold);
}

/* 结局样式 */
.ending-text {
  text-align: center; padding: 20px 0;
}
.ending-text .rank {
  font-size: 3em; color: var(--gold); margin: 15px 0;
}

/* 属性面板 */
#attrs-panel {
  margin-top: 20px; padding: 12px 18px;
  background: rgba(0,0,0,0.3); border-radius: 4px;
  border: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 10px 20px;
  justify-content: center; font-size: 0.9rem;
}
#attrs-panel:empty,
#actions:empty { display: none; }
.attr-item {
  display: grid; grid-template-columns: auto 32px 60px; align-items: center; gap: 6px;
}
.attr-name { color: var(--text-dim); }
.attr-value { color: var(--gold); font-weight: 700; min-width: 24px; text-align: right; }
.attr-bar {
  width: 60px; height: 4px; background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow: hidden;
}
.attr-bar-fill {
  height: 100%; background: var(--gold); border-radius: 2px;
  transition: width 0.8s ease;
}

/* 底部操作栏 */
#actions {
  display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; justify-content: center;
}
.action-btn {
  min-height: 40px; padding: 8px 18px; font-family: inherit; font-size: 0.9rem;
  color: var(--text-dim); background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:hover { border-color: var(--gold); color: var(--gold); }

/* 弹窗 */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: calc(16px + var(--safe-top)) calc(16px + var(--safe-right)) calc(16px + var(--safe-bottom)) calc(16px + var(--safe-left));
}
.modal {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 28px; max-width: 560px; width: min(100%, 560px);
  box-shadow: 0 10px 50px rgba(0,0,0,0.8);
  max-height: min(82vh, 720px); overflow-y: auto;
  overscroll-behavior: contain;
}
.modal h2 {
  text-align: center; color: var(--gold); margin-bottom: 20px;
  letter-spacing: 0.1em;
}
.modal .close-btn {
  display: block; margin: 20px auto 0; min-height: 42px; padding: 8px 30px;
  font-family: inherit; color: var(--text); background: rgba(0,0,0,0.3);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
}

/* 角色创建 */
.attr-input-group {
  display: grid;
  grid-template-columns: 56px 40px 76px 40px minmax(100px, 1fr);
  align-items: center; gap: 10px; margin: 8px 0;
}
.attr-input-group label {
  color: var(--text); text-align: right;
}
.attr-input-group input {
  width: 100%; min-height: 40px; padding: 6px 10px; font-family: inherit;
  background: rgba(0,0,0,0.4); color: var(--gold);
  border: 1px solid var(--border); border-radius: 4px;
  text-align: center; font-size: 1rem;
}
.attr-stepper {
  width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
  font-family: inherit; font-size: 1.1rem; font-weight: 700;
  color: var(--gold); background: rgba(0,0,0,0.3);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.attr-stepper:active { transform: translateY(1px); }
.attr-stepper:hover { border-color: var(--gold); }
.attr-input-group input:focus {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}
.attr-input-group .attr-hint {
  font-size: 0.85rem; color: var(--text-dim);
}
.trait-option {
  display: block; width: 100%; min-height: 52px; padding: 10px 15px; margin: 6px 0;
  font-family: inherit; font-size: 0.95rem; line-height: 1.45; text-align: left;
  color: var(--text); background: rgba(0,0,0,0.3);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.trait-option:hover, .trait-option.selected {
  border-color: var(--gold); color: var(--gold-light);
  background: rgba(201,169,110,0.1);
}

/* 名字输入 */
.name-input {
  width: 100%; max-width: 320px; min-height: 46px; padding: 10px 15px;
  font-family: inherit; font-size: 1.05rem; text-align: center;
  background: rgba(0,0,0,0.4); color: var(--gold);
  border: 1px solid var(--border); border-radius: 4px;
}

@media (hover: hover) and (pointer: fine) {
  .choice-btn:hover { transform: translateX(4px); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
  .particle { display: none; }
}

/* 响应式 */
@media (max-width: 720px) {
  :root { --page-padding: 14px; }
  #app { padding-top: calc(18px + var(--safe-top)); }
  #header { padding: 14px 0 14px; margin-bottom: 16px; }
  #header h1 { font-size: 1.65rem; letter-spacing: 0.22em; }
  #header .subtitle { font-size: 0.82rem; letter-spacing: 0.14em; }
  #content { padding: 22px 16px; min-height: 360px; }
  .chapter-title { font-size: 1.1rem; margin-bottom: 18px; letter-spacing: 0.08em; }
  .chapter-title::before,
  .chapter-title::after { content: ''; }
  .story-text { font-size: 1rem; line-height: 1.85; text-indent: 0; }
  .choice-btn { padding: 12px 14px; }
  #attrs-panel { gap: 8px 12px; padding: 10px 12px; justify-content: flex-start; }
  .attr-item { grid-template-columns: 42px 30px minmax(48px, 1fr); width: calc(50% - 6px); }
  .attr-bar { width: 100%; }
  #actions {
    position: sticky; bottom: var(--safe-bottom); z-index: 20;
    padding: 10px 0 4px; margin-top: 12px;
    background: linear-gradient(180deg, transparent, var(--bg) 20%);
  }
  .action-btn { flex: 1 1 calc(33.333% - 8px); padding: 8px 10px; }
  .gallery-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 460px) {
  :root { --page-padding: 10px; }
  #content { padding: 18px 12px; }
  .choice-btn { min-height: 50px; font-size: 0.96rem; }
  .choice-btn .idx { width: 26px; height: 26px; line-height: 26px; flex-basis: 26px; }
  .attr-item { width: 100%; }
  .attr-input-group {
    grid-template-columns: 52px 40px minmax(70px, 1fr) 40px;
    gap: 8px;
  }
  .attr-input-group .attr-hint {
    grid-column: 2 / -1;
    font-size: 0.8rem;
  }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal {
    width: 100%; max-width: none;
    max-height: calc(88vh - var(--safe-top));
    border-radius: 8px 8px 0 0;
    padding: 22px 16px calc(22px + var(--safe-bottom));
  }
  #audio-toggle { width: 40px; height: 40px; }
}

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* 淡入动画 */
.fade-in {
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 保存成功提示 */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--panel); border: 1px solid var(--gold);
  color: var(--gold); padding: 10px 25px; border-radius: 4px;
  z-index: 200; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
}
@keyframes toastIn { from { opacity: 0; top: -20px; } to { opacity: 1; top: 20px; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

#remaining-points {
  text-align: center; font-size: 1.1em; color: var(--gold);
  margin: 10px 0; padding: 8px;
  background: rgba(201,169,110,0.08);
  border-radius: 4px;
}

/* ========== 章节过渡动画 ========== */
.chapter-transition {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg); z-index: 50;
  display: flex; align-items: center; justify-content: center;
  animation: chapterIn 0.6s ease-out;
  pointer-events: none;
}
.chapter-transition.out {
  animation: chapterOut 0.4s ease-in forwards;
}
@keyframes chapterIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes chapterOut {
  from { opacity: 1; }
  to { opacity: 0; }
}
.chapter-transition .chinese-char {
  font-size: 5em; color: var(--gold);
  animation: charAppear 0.8s ease-out;
}
@keyframes charAppear {
  from { transform: scale(3); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ========== 墨染过渡 ========== */
.ink-spread {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 49;
  background: radial-gradient(circle at center, var(--bg) 0%, transparent 70%);
  animation: inkSpread 0.6s ease-out forwards;
}
@keyframes inkSpread {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

/* ========== 结局总结 ========== */
.ending-summary {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 6px; padding: 20px; margin: 20px 0;
}
.ending-summary .path-timeline {
  display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0;
  justify-content: center;
}
.path-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--gold); opacity: 0.5;
}
.ending-summary table {
  width: 100%; margin: 15px 0; border-collapse: collapse;
}
.ending-summary td {
  padding: 6px 10px; border-bottom: 1px solid var(--border);
}
.ending-summary td:last-child { text-align: right; color: var(--gold); }

/* ========== 画廊 ========== */
.gallery-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px; margin: 15px 0;
}
.gallery-card {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px; text-align: center;
  transition: all 0.3s;
}
.gallery-card:hover { border-color: var(--gold); }
.gallery-card .rank-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 0.8em; font-weight: 700; margin: 4px 0;
}
.rank-ss { background: #c9a96e; color: #1a1410; }
.rank-s { background: #a0522d; color: #d4c5a9; }
.rank-a { background: #6b8e6b; color: #d4c5a9; }
.rank-b { background: #3a5070; color: #d4c5a9; }
.rank-c, .rank-d { background: #5a3a3a; color: #d4c5a9; }
.gallery-count {
  text-align: center; font-size: 0.9em; color: var(--text-dim);
  margin-bottom: 10px;
}

/* ========== 音效按钮 ========== */
#audio-toggle {
  position: fixed; top: calc(14px + var(--safe-top)); right: calc(14px + var(--safe-right)); z-index: 30;
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(0,0,0,0.5); border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer; font-size: 16px;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
#audio-toggle:hover { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>

<button id="audio-toggle" onclick="toggleAudio()" title="音效开关">🔇</button>
<div id="particles"></div>

<div id="app">
  <div id="header">
    <h1>仙 途</h1>
    <div class="subtitle">文 字 修 仙</div>
  </div>
  <div id="content"></div>
  <div id="attrs-panel"></div>
  <div id="actions"></div>
</div>

<script>
// ============================================================
// 游戏前端逻辑
// ============================================================
const SID_KEY = 'xiantu_session_id';
const SID = (() => {
  const existing = localStorage.getItem(SID_KEY);
  if (existing) return existing;
  const next = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'sid-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
  localStorage.setItem(SID_KEY, next);
  return next;
})();
const API = '';

let currentNode = null;
let isEnding = false;
let activeChoices = [];

function escapeHTML(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

// 初始化粒子
function initParticles() {
  const chars = ['✦','✧','❋','•','·','。','、','～'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = chars[Math.floor(Math.random() * chars.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 15) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.fontSize = (16 + Math.random() * 30) + 'px';
    container.appendChild(p);
  }
}

// API 调用
async function api(path, data = {}) {
  data.session_id = SID;
  const r = await fetch(API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  const payload = await r.json();
  if (!r.ok || payload.error) {
    throw new Error(payload.error || '请求失败');
  }
  return payload;
}

async function apiGet(path) {
  const r = await fetch(API + path);
  const payload = await r.json();
  if (!r.ok || payload.error) {
    throw new Error(payload.error || '请求失败');
  }
  return payload;
}

// Toast 提示
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}

// 渲染属性面板
function renderAttrs(attrs) {
  const panel = document.getElementById('attrs-panel');
  if (!attrs) { panel.innerHTML = ''; return; }
  const maxVal = 60;
  panel.innerHTML = Object.entries(attrs).map(([k, v]) => {
    const pct = Math.min(100, (v / maxVal) * 100);
    return `<div class="attr-item">
      <span class="attr-name">${k}</span>
      <span class="attr-value">${v}</span>
      <div class="attr-bar"><div class="attr-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

// 渲染操作按钮
function renderActions() {
  const el = document.getElementById('actions');
  el.innerHTML = `
    <button class="action-btn" onclick="saveGame()">💾 保存进度</button>
    <button class="action-btn" onclick="showLoadModal()">📂 读取存档</button>
    <button class="action-btn" onclick="restartGame()">🔄 重新开始</button>
  `;
}

// 渲染文本（支持换行）
function renderText(text) {
  return escapeHTML(text).replace(/\n/g, '<br>');
}

// 自动存档 — 章节切换时覆盖同一文件
let lastChapter = '';
let autoSaveFile = '';  // 本次游玩的自动存档文件名

function getChapter(title) {
  const m = title.match(/^(第[〇一二三四五六七八九十终]+章)/);
  return m ? m[1] : title;
}

function resetAutoSave() {
  autoSaveFile = '';
  lastChapter = '';
}

async function autoSaveOnChapter(data) {
  const chapter = getChapter(data.title);
  if (chapter && chapter !== lastChapter && lastChapter !== '') {
    // 首次自动存档创建新文件，后续覆盖同一文件
    const payload = autoSaveFile ? { overwrite: autoSaveFile } : {};
    try {
      const r = await api('/api/save', payload);
      if (!autoSaveFile && r.filename) autoSaveFile = r.filename;
      toast('已自动存档 (' + chapter + ')');
    } catch (err) {
      toast(err.message || '自动存档失败');
    }
  }
  if (chapter) lastChapter = chapter;
}

// 显示节点
function renderNode(data) {
  currentNode = data;
  isEnding = data.is_ending;
  activeChoices = data.choices || [];
  const content = document.getElementById('content');

  // 章节切换时自动存档（静默，后台完成）
  autoSaveOnChapter(data);

  let html = `<div class="fade-in">`;
  html += `<div class="chapter-title">${escapeHTML(data.title)}</div>`;
  html += `<div class="story-text">${renderText(data.text)}</div>`;

  if (data.is_ending) {
    html += `<div class="choices">`;
    html += `<button class="choice-btn" onclick="restartGame()"><span class="idx">1</span>重新开始</button>`;
    html += `<button class="choice-btn" onclick="showStartScreen()"><span class="idx">2</span>返回主菜单</button>`;
    html += `</div>`;
  } else if (data.choices && data.choices.length > 0) {
    html += `<div class="choices">`;
    data.choices.forEach((c, i) => {
      html += `<button class="choice-btn" onclick="makeChoice(${c.index})">
        <span class="idx">${i + 1}</span><span>${escapeHTML(c.text)}</span>
      </button>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  content.innerHTML = html;

  renderAttrs(data.attrs);
  renderActions();
  content.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 做选择
async function makeChoice(idx) {

async function initNewGame() {
  const name = document.getElementById('name-input').value.trim() || '叶尘';
  try {
    await api('/api/new_game', { name });
  } catch (err) {
    toast(err.message || '新游戏创建失败');
    return;
  }

  const content = document.getElementById('content');
  const total = 100;
  const min = 5;
  let attrs = { 根骨: min, 幸运: min, 魅力: min, 精神: min, 悟性: min };
  let remaining = total - Object.keys(attrs).length * min;

  const hints = { 根骨: '战斗·肉身', 幸运: '机缘·寻宝', 魅力: '社交·交易', 精神: '意志·心魔', 悟性: '学习·功法' };

  // 只渲染一次骨架
  let rows = Object.keys(attrs).map(k => `
    <div class="attr-input-group">
      <label>${k}</label>
      <button class="attr-stepper attr-minus" type="button" data-key="${k}" aria-label="${k}减一">−</button>
      <input type="number" id="attr-${k}" value="${min}" min="${min}" max="${min + remaining}">
      <button class="attr-stepper attr-plus" type="button" data-key="${k}" aria-label="${k}加一">+</button>
      <span class="attr-hint">${hints[k]}</span>
    </div>
  `).join('');

  content.innerHTML = `
    <div class="fade-in">
      <div class="chapter-title">分配属性</div>
      <div id="remaining-points">剩余点数: <strong>${remaining}</strong></div>
      ${rows}
      <button class="choice-btn" style="max-width:200px;margin:20px auto;display:block" id="confirm-attrs-btn">
        <span class="idx">→</span>确认属性
      </button>
    </div>`;

  // 直接 DOM 更新，无闪烁
  const remainingEl = document.getElementById('remaining-points');

  function updateUI(key) {
    document.getElementById(`attr-${key}`).value = attrs[key];
    remainingEl.innerHTML = `剩余点数: <strong>${remaining}</strong>`;
  }

  // 绑定事件（不重渲染）
  content.querySelectorAll('.attr-plus').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      if (remaining <= 0) return;
      attrs[key]++; remaining--;
      updateUI(key);
    });
  });

  content.querySelectorAll('.attr-minus').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      if (attrs[key] <= min) return;
      attrs[key]--; remaining++;
      updateUI(key);
    });
  });

  content.querySelectorAll('input[type=number]').forEach(input => {
    input.addEventListener('change', () => {
      const key = input.id.replace('attr-', '');
      let val = parseInt(input.value);
      if (isNaN(val)) { input.value = attrs[key]; return; }
      const diff = val - attrs[key];
      if (diff > remaining) val = attrs[key] + remaining;
      if (val < min) val = min;
      remaining -= (val - attrs[key]);
      attrs[key] = val;
      updateUI(key);
    });
  });

  document.getElementById('confirm-attrs-btn').addEventListener('click', () => {
    if (remaining > 0) {
      if (!confirm(`还有 ${remaining} 点未分配，确定继续？`)) return;
    }
    showTraitSelection(attrs);
  });
}

// ============================================================
// Web Audio API — 古风氛围音
// ============================================================
let audioCtx = null;
let audioOn = true;

function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { audioOn = false; }
}

function playNote(freq, duration, type = 'sine', vol = 0.06) {
  if (!audioOn || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// 点击选项时播放
function playChoiceClick() {
  playNote(880, 0.08, 'sine', 0.04);
  setTimeout(() => playNote(1100, 0.06, 'sine', 0.03), 50);
}

// 章节切换时播放
function playChapterSound() {
  playNote(220, 0.6, 'triangle', 0.05);
  setTimeout(() => playNote(330, 0.4, 'triangle', 0.04), 200);
  setTimeout(() => playNote(440, 0.3, 'triangle', 0.03), 400);
}

// 到达结局时播放
function playEndingSound() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playNote(f, 0.5, 'triangle', 0.06), i * 150);
  });
}

function toggleAudio() {
  initAudio();
  audioOn = !audioOn;
  document.getElementById('audio-toggle').textContent = audioOn ? '🔊' : '🔇';
  if (audioOn) playNote(440, 0.1, 'sine', 0.03);
}

function showChapterTransition(title, callback) {

  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => { el.remove(); if (callback) callback(); }, 400);
  }, 800);
}

// ============================================================
// 结局画廊
// ============================================================
async function showGallery() {
  let endings = [];
  try {
    endings = await apiGet('/api/gallery');
  } catch (err) {
    toast(err.message || '读取画廊失败');
    return;
  }
  const total = 46; // 总共有 46 个结局
  const content = document.getElementById('content');

  function getRankClass(title) {
    const t = title || '';
    if (t.includes('SS')) return 'rank-ss';
    if (t.includes('S——') || t.includes('S：')) return 'rank-s';
    if (t.includes('A——') || t.includes('A：')) return 'rank-a';
    if (t.includes('B——') || t.includes('B：')) return 'rank-b';
    return 'rank-d';
  }
  function getRankLabel(title) {
    const t = title || '';
    if (t.includes('SS')) return 'SS';
    if (t.includes('S——') || t.includes('S：')) return 'S';
    if (t.includes('A——') || t.includes('A：')) return 'A';
    if (t.includes('B——') || t.includes('B：')) return 'B';
    if (t.includes('C——') || t.includes('C：')) return 'C';
    return 'D';
  }

  let html = `<div class="fade-in">
    <div class="chapter-title">结局画廊</div>
    <div class="gallery-count">已收集: ${endings.length} / ${total}</div>`;

  if (endings.length === 0) {
    html += '<p style="text-align:center;color:var(--text-dim)">还没有达成任何结局，去探索吧。</p>';
  } else {
    html += '<div class="gallery-grid">';
    endings.forEach(e => {
      html += `<div class="gallery-card">
        <div class="rank-badge ${getRankClass(e.title)}">${escapeHTML(getRankLabel(e.title))}</div>
        <p style="margin:8px 0;font-size:0.9rem">${escapeHTML((e.title || '').replace('【结局】',''))}</p>
        <p style="font-size:0.75rem;color:var(--text-dim)">${escapeHTML(e.saved_at || e.achieved_at || '')}</p>
        <p style="font-size:0.75rem;color:var(--text-dim)">${escapeHTML(e.player_name || '')} · ${escapeHTML(e.trait || '')}</p>
      </div>`;
    });
    html += '</div>';
  }
  html += `<button class="choice-btn" style="max-width:200px;margin:10px auto;display:block" onclick="showMainMenu()">
    <span class="idx">←</span>返回主菜单</button></div>`;

  content.innerHTML = html;
  document.getElementById('attrs-panel').innerHTML = '';
  document.getElementById('actions').innerHTML = '';
}

// ============================================================
// 结局总结
// ============================================================
async function showEndingSummary(data) {
  try {
    await api('/api/record_ending');
  } catch (err) {
    toast(err.message || '结局记录失败');
  }
  playEndingSound();

  const node = data;
  let summaryHTML = '<div class="ending-summary">';
  summaryHTML += '<div class="chapter-title">通关总结</div>';

  // 属性概览
  summaryHTML += '<table><tr><td colspan="2" style="color:var(--gold);text-align:center">最终属性</td></tr>';
  for (const [k, v] of Object.entries(data.attrs || {})) {
    const bar = '█'.repeat(Math.min(20, Math.round(v / 3))) + '░'.repeat(Math.max(0, 20 - Math.round(v / 3)));
    summaryHTML += `<tr><td>${escapeHTML(k)}</td><td>${escapeHTML(v)} ${bar}</td></tr>`;
  }
  summaryHTML += '</table>';

  // 决策轮数
  summaryHTML += `<p style="text-align:center;color:var(--text-dim);margin-top:12px">
    词条: ${escapeHTML(data.trait || '无')} · 结局: ${escapeHTML((node.title || '').replace('【结局】',''))}
  </p>`;
  summaryHTML += '</div>';

  return summaryHTML;
}

// ============================================================
// 重写 renderNode — 接入所有新功能
// ============================================================
const _renderNode_original = renderNode;
renderNode = async function(data) {
  const chapter = getChapter(data.title);

  // 章节切换过渡
  if (chapter && chapter !== lastChapter && lastChapter !== '') {
    showChapterTransition(chapter);
    playChapterSound();

  _renderNode_original(data);

  // 结局总结 — 渲染到正文下方

      div.innerHTML = summary;
      storyEl.parentNode.insertBefore(div, storyEl.nextSibling);

};

// 桌面浏览器键盘操作，Mac/Windows 都可用
document.addEventListener('keydown', event => {
  const tag = event.target && event.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  if (/^[1-9]$/.test(event.key)) {
    const idx = Number(event.key) - 1;
    if (activeChoices[idx]) {
      event.preventDefault();
      makeChoice(activeChoices[idx].index);
    }
  } else if (event.key.toLowerCase() === 's' && currentNode && !isEnding) {
    event.preventDefault();
    saveGame();
  } else if (event.key === 'Escape') {
    const modal = document.querySelector('.modal-overlay');
    if (modal) {
      modal.remove();
    } else {
      showMainMenu();
    }
  }
});
